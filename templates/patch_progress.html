<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Building patched PPTX</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <main class="container narrow">
    <h1>Building patched PPTX</h1>
    <section class="panel">
      <div class="progress-header">
        <div>
          <div id="stageText" class="stage">{{ job.get('stage', 'queued_patch') }}</div>
          <div id="detailText" class="detail">{{ job.get('detail', 'Queued for patching.') }}</div>
        </div>
        <div id="percentText" class="percent">{{ "%.0f"|format(job.get('progress', 0.0)) }}%</div>
      </div>
      <div class="progress-bar-wrap"><div id="progressBar" class="progress-bar" style="width: {{ job.get('progress', 0.0) }}%;"></div></div>
      <p class="small-note">This page updates while the app converts images, embeds replacements, updates XML references, and zips the patched PowerPoint.</p>
    </section>
  </main>
<script>
const jobId = {{ job_id|tojson }};
async function poll() {
  const r = await fetch(`/job/${jobId}/status`);
  const data = await r.json();
  if (data.error) return;
  document.getElementById('stageText').textContent = data.stage || '';
  document.getElementById('detailText').textContent = data.detail || '';
  document.getElementById('percentText').textContent = `${Math.round(data.progress || 0)}%`;
  document.getElementById('progressBar').style.width = `${data.progress || 0}%`;
  if (data.status === 'patched') {
    window.location.href = `/job/${jobId}/downloads`;
    return;
  }
  if (data.status !== 'error') setTimeout(poll, 900);
}
poll();
</script>
</body>
</html>
